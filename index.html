<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>役員変更 楽楽見積ウィザード v5</title>
<style>
:root{--main:#1a2744;--accent:#2563eb;--accent-light:#dbeafe;--sub:#64748b;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--warn:#dc2626;--warn-bg:#fef2f2;--ok:#166534;--ok-bg:#f0fdf4;--ok-border:#bbf7d0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:var(--bg);color:var(--main);font-size:14px;line-height:1.7}
.w{max-width:640px;margin:0 auto;padding:24px 16px}
.hd{text-align:center;margin-bottom:24px}
.hd h1{font-size:18px;font-weight:700;margin-bottom:4px}
.hd p{font-size:12px;color:var(--sub)}
.prog{display:flex;gap:4px;margin-bottom:24px}
.prog div{flex:1;height:4px;border-radius:2px;background:var(--border);transition:all .3s}
.prog .a{background:var(--accent)}.prog .d{background:var(--accent-light)}
.cd{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ql{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px;letter-spacing:1px}
.qt{font-size:16px;font-weight:600;margin-bottom:16px}
.op{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;margin-bottom:6px;transition:all .15s}
.op:hover{border-color:var(--accent)}.op.s{border:2px solid var(--accent);background:var(--accent-light);font-weight:600}
.rd{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}.op.s .rd{border:5px solid var(--accent)}
.ck{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}.op.s .ck{border:none;background:var(--accent)}
.ol{font-size:14px}.os{font-size:11px;color:var(--sub)}
.st{font-size:11px;color:var(--sub);font-weight:600;margin:12px 0 6px;letter-spacing:1px}
.stp{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.stp .lb{font-size:13px;min-width:100px}
.stp button{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.stp button:hover{background:var(--accent-light)}
.stp .vl{font-size:20px;font-weight:700;min-width:36px;text-align:center}
.stp .un{font-size:12px;color:var(--sub)}
.nv{display:flex;gap:8px;justify-content:space-between}
.bt{padding:10px 24px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;border:1px solid var(--border);background:var(--card);color:var(--main)}
.bt.p{border:none;background:var(--accent);color:#fff}.bt:disabled{opacity:.4;cursor:default}
.cb{background:#f1f5f9;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;line-height:2}
.ob{background:var(--ok-bg);border:1px solid var(--ok-border);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--ok)}
.wb{background:var(--warn-bg);border:1px solid #fecaca;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:var(--warn)}
.sh{color:var(--warn);font-weight:700}
.sb{background:var(--accent-light);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px}
.rr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.rc{font-size:11px;color:var(--sub);font-weight:600;margin:8px 0 2px;letter-spacing:.5px}
.rt{display:flex;justify-content:space-between;padding:12px 0;font-weight:700;font-size:16px;border-top:2px solid var(--main);margin-top:8px}
.rs{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-top:1px solid var(--border)}
.nt{font-size:11px;color:var(--sub);margin-top:8px;line-height:1.8}
.ib{margin-top:16px;padding:12px 16px;background:#f1f5f9;border-radius:8px}
.cw{margin-top:6px;font-weight:600}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-left:6px;font-weight:600}
.tag.kai{background:#dbeafe;color:#1d4ed8}
.tag.hen{background:#fef3c7;color:#92400e}
.tag.nashi{background:#e2e8f0;color:#475569}
</style>
</head>
<body>
<div class="w" id="app"></div>
<script>
const P={base:30000,minSH:10000,minBD:10000,minDD:5000,apPP:3000,auPP:3000,rsPP:2000,rep:10000,org:20000,death:5000,regFee:20000,tax1:10000,tax2:30000,cert:1180,insp:660};
const fmt=n=>n.toLocaleString('ja-JP');
const OL=["取締役会あり＋監査役あり","（無効）","取締役会なし＋監査役あり","取締役会なし＋監査役なし"];

const INIT={step:0,q0_organ:null,q0_cD:3,q0_cA:1,
  q1_changes:[],
  q1b_dirS:null,q1b_audS:null, // 改選/変更する/変更しない
  q2a_dK:0,q2a_aK:0,  // 改選対象の重任人数
  q2a_dH:0,q2a_aH:0,  // 変更する場合の就任人数
  q2a_hasRep:false,
  q2b_reason:null,q2b_dR:0,q2b_aR:0, // 退任（変更する場合）
  q3_succ:null,q4_rep:null,
  q5_short:null,q5_dS:false,q5_aS:false,q5_rD:0,q5_rA:0,q5_res:null,
  q6_ext:[],capOver:false};
let S={...INIT};

function u(k,v){S[k]=v;render();}
function hB(){return S.q0_organ===0||S.q0_organ===1;}
function hA(){return S.q0_organ===0||S.q0_organ===2;}
function q1Has(v){return S.q1_changes.includes(v);}
function hasKaisen(){return q1Has("改選");}
function hasResign(){return q1Has("退任");}
function hasAppoint(){return S.q1_changes.some(c=>["就任","代表変更"].includes(c));}
function hasRepCh(){return q1Has("代表変更");}

// 各ロールの実効状態（改選以外の場合も考慮）
function dirStatus(){
  if(hasKaisen()&&S.q1b_dirS)return S.q1b_dirS;
  if(q1Has("就任")||q1Has("退任"))return "変更する";
  return "変更しない";
}
function audStatus(){
  if(!hA())return "対象外";
  if(hasKaisen()&&S.q1b_audS)return S.q1b_audS;
  if(q1Has("就任")||q1Has("退任"))return "変更する";
  return "変更しない";
}

// Q1Bが必要か：改選＋監査役設置の場合
function needQ1B(){return hasKaisen()&&hA();}
// Q1Bが必要ないケース：改選＋監査役なし → 取締役のみ改選が自明
function autoSetQ1B(){
  if(hasKaisen()&&!hA()){S.q1b_dirS="改選";S.q1b_audS="対象外";}
}

// 退任入力が必要か（変更する役員がいる場合）
function needResignInput(){
  return dirStatus()==="変更する"||audStatus()==="変更する";
}

// ステップフロー
function getSteps(){
  const f=["q0","q1"];
  if(hasKaisen()){
    if(needQ1B())f.push("q1b");
    else autoSetQ1B();
  }
  f.push("q2a");
  if(needResignInput()||hasResign())f.push("q2b");
  if(needResignInput()||hasResign())f.push("q3");
  if(hasRepCh()||hasAppoint()||hasKaisen())f.push("q4");
  f.push("q5","q6","result");
  return f;
}

function canGo(){
  const cs=getSteps()[S.step];
  switch(cs){
    case"q0":return S.q0_organ!==null;
    case"q1":return S.q1_changes.length>0;
    case"q1b":return S.q1b_dirS!==null&&S.q1b_audS!==null&&(S.q1b_dirS==="改選"||S.q1b_audS==="改選");
    case"q2a":return true;
    case"q2b":{
      if(!S.q2b_reason)return false;
      const dNeed=dirStatus()==="変更する";
      const aNeed=audStatus()==="変更する";
      if(dNeed&&S.q2b_dR<1&&!hasResign())return true; // 退任なしでも可（就任のみの変更）
      return true;
    }
    case"q3":return S.q3_succ!==null;
    case"q4":return S.q4_rep!==null;
    case"q5":return S.q5_short!==null&&(S.q5_short===false||S.q5_res!==null);
    case"q6":return true;
    default:return false;
  }
}

function calcShortage(){
  let rD,rA;
  const ds=dirStatus(),as=audStatus();
  // 取締役
  if(ds==="改選") rD=S.q2a_dK||0;
  else if(ds==="変更する") rD=(S.q0_cD||0)-(S.q2b_dR||0)+(S.q2a_dH||0);
  else rD=S.q0_cD||0; // 変更なし
  // 監査役
  if(as==="改選") rA=S.q2a_aK||0;
  else if(as==="変更する") rA=(S.q0_cA||0)-(S.q2b_aR||0)+(S.q2a_aH||0);
  else if(as==="対象外") rA=0;
  else rA=S.q0_cA||0; // 変更なし
  
  const mD=hB()?3:1,mA=hA()?1:0;
  const dS=rD<mD,aS=rA<mA;
  return{short:dS||aS,dS,aS,rD,rA,mD,mA};
}

function goNext(){
  const steps=getSteps();
  if(steps[S.step+1]==="q5"){
    const needsCalc=dirStatus()!=="変更しない"||audStatus()!=="変更しない";
    if(needsCalc){
      const r=calcShortage();
      S.q5_short=r.short;S.q5_dS=r.dS;S.q5_aS=r.aS;S.q5_rD=r.rD;S.q5_rA=r.rA;
      if(!r.short)S.q5_res=null;
    }else{S.q5_short=false;S.q5_dS=false;S.q5_aS=false;S.q5_res=null;}
  }
  S.step=Math.min(S.step+1,steps.length-1);render();
}
function goBack(){S.step=Math.max(S.step-1,0);render();}
function reset(){S={...INIT,q1_changes:[],q6_ext:[]};render();}

// ── UI Helpers ──
function radio(opts,sel,key){
  return opts.map(o=>`<div class="op${sel===o.v?' s':''}" onclick="u('${key}',${typeof o.v==='string'?"'"+o.v+"'":o.v})"><div class="rd"></div><div><div class="ol">${o.l}</div>${o.s?`<div class="os">${o.s}</div>`:''}</div></div>`).join('');
}
function stepper(label,key,min,max){
  const v=S[key]||0;
  return `<div class="stp"><div class="lb">${label}</div><button onclick="u('${key}',Math.max(${min},${v}-1))">−</button><div class="vl">${v}</div><button onclick="u('${key}',Math.min(${max},${v}+1))">+</button><div class="un">名</div></div>`;
}
function selectOrgan(v){
  S.q0_organ=v;const b=(v===0||v===1),a=(v===0||v===2);
  if(b&&S.q0_cD<3)S.q0_cD=3;
  if(a&&S.q0_cA<1)S.q0_cA=1;
  if(!a)S.q0_cA=0;render();
}
function toggleList(key,v){const a=S[key],i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);render();}
function tagHTML(status){
  if(status==="改選")return '<span class="tag kai">改選</span>';
  if(status==="変更する")return '<span class="tag hen">変更</span>';
  if(status==="変更しない")return '<span class="tag nashi">変更なし</span>';
  return '';
}

// ── Render Steps ──
function renderStep(){
  const cs=getSteps()[S.step];
  switch(cs){
    case"q0":{
      let inner='';
      if(S.q0_organ!==null){
        inner=`<div class="ib"><div class="st" style="margin-top:0">現在の役員人数</div>${stepper('取締役','q0_cD',1,20)}${hA()?stepper('監査役','q0_cA',0,20):''}<div style="font-size:11px;color:var(--sub);margin-top:4px">※ 代表取締役を含む人数</div></div>`;
      }
      return `<div class="ql">Q0 ─ 基礎情報</div><div class="qt">現在の機関設計を教えてください</div>`+
        [0,2,3].map(i=>`<div class="op${S.q0_organ===i?' s':''}" onclick="selectOrgan(${i})"><div class="rd"></div><div class="ol">${OL[i]}</div></div>`).join('')+inner;
    }
    case"q1":
      return `<div class="ql">Q1 ─ 変更内容</div><div class="qt">今回行いたい変更を選択してください</div><div style="font-size:12px;color:var(--sub);margin-bottom:8px">複数選択可</div>`+
        [{v:"就任",l:"① 就任（新たに役員を選任）"},{v:"退任",l:"② 退任（辞任・死亡・解任）"},{v:"改選",l:"③ 任期満了による改選"},{v:"代表変更",l:"④ 代表取締役の変更"}].map(o=>{
          const sel=S.q1_changes.includes(o.v);
          return `<div class="op${sel?' s':''}" onclick="toggleList('q1_changes','${o.v}')"><div class="ck">${sel?'✓':''}</div><div class="ol">${o.l}</div></div>`;
        }).join('');

    case"q1b":
      return `<div class="ql">Q1B ─ 改選の対象</div><div class="qt">各役員の状態を選択してください</div>`+
        `<div class="st" style="margin-top:0">取締役の状態</div>`+
        radio([{v:'改選',l:'改選（任期満了→重任/交代）'},{v:'変更する',l:'変更する（辞任+就任等）'},{v:'変更しない',l:'変更しない（登記なし）'}],S.q1b_dirS,'q1b_dirS')+
        `<div class="st">監査役の状態</div>`+
        radio([{v:'改選',l:'改選（任期満了→重任/交代）'},{v:'変更する',l:'変更する（辞任+就任等）'},{v:'変更しない',l:'変更しない（登記なし）'}],S.q1b_audS,'q1b_audS')+
        `<div style="font-size:11px;color:var(--sub);margin-top:8px">※ 少なくとも1つは「改選」を選択してください</div>`;

    case"q2a":{
      const ds=dirStatus(),as=audStatus();
      let h=`<div class="ql">Q2A ─ 就任・重任の人数</div><div class="qt">変更後の役員人数を教えてください</div>`;
      // 取締役
      if(ds==="改選"){
        h+=`<div class="st" style="margin-top:0">取締役${tagHTML(ds)}</div>`;
        h+=`<div style="font-size:12px;color:var(--sub);margin-bottom:6px">改選後に就任・重任する取締役の人数</div>`;
        h+=stepper('取締役','q2a_dK',0,20);
      }else if(ds==="変更する"){
        h+=`<div class="st" style="margin-top:0">取締役${tagHTML(ds)}</div>`;
        h+=`<div style="font-size:12px;color:var(--sub);margin-bottom:6px">新たに就任する取締役の人数</div>`;
        h+=stepper('取締役（就任）','q2a_dH',0,20);
      }else{
        h+=`<div class="st" style="margin-top:0">取締役${tagHTML(ds)}</div>`;
        h+=`<div style="font-size:12px;color:var(--sub)">変更なし → 現在の${S.q0_cD}名のまま</div>`;
      }
      // 監査役
      if(hA()){
        if(as==="改選"){
          h+=`<div class="st">監査役${tagHTML(as)}</div>`;
          h+=`<div style="font-size:12px;color:var(--sub);margin-bottom:6px">改選後に就任・重任する監査役の人数</div>`;
          h+=stepper('監査役','q2a_aK',0,20);
        }else if(as==="変更する"){
          h+=`<div class="st">監査役${tagHTML(as)}</div>`;
          h+=`<div style="font-size:12px;color:var(--sub);margin-bottom:6px">新たに就任する監査役の人数</div>`;
          h+=stepper('監査役（就任）','q2a_aH',0,20);
        }else if(as==="変更しない"){
          h+=`<div class="st">監査役${tagHTML(as)}</div>`;
          h+=`<div style="font-size:12px;color:var(--sub)">変更なし → 現在の${S.q0_cA}名のまま</div>`;
        }
      }
      // 代表
      h+=`<div style="margin-top:12px"><div class="op${S.q2a_hasRep?' s':''}" onclick="u('q2a_hasRep',${!S.q2a_hasRep})"><div class="ck">${S.q2a_hasRep?'✓':''}</div><div class="ol">代表取締役の選定を含む</div></div></div>`;
      return h;
    }

    case"q2b":{
      const ds=dirStatus(),as=audStatus();
      const dNeedResign=ds==="変更する";
      const aNeedResign=as==="変更する";
      let h=`<div class="ql">Q2B ─ 退任の詳細</div><div class="qt">退任する役員を教えてください</div>`;
      h+=`<div class="st" style="margin-top:0">退任理由</div>`+radio([{v:'辞任',l:'辞任'},{v:'死亡',l:'死亡'},{v:'解任',l:'解任'}],S.q2b_reason,'q2b_reason');
      h+=`<div class="st">退任人数</div>`;
      if(dNeedResign||hasResign()) h+=stepper('取締役','q2b_dR',0,S.q0_cD);
      if((aNeedResign||hasResign())&&hA()) h+=stepper('監査役','q2b_aR',0,S.q0_cA);
      const tot=(S.q2b_dR||0)+(S.q2b_aR||0);
      if(tot>0)h+=`<div style="font-size:12px;color:var(--sub);background:#f1f5f9;border-radius:8px;padding:8px 12px;margin-top:8px">退任合計：${tot}名</div>`;
      return h;
    }

    case"q3":
      return `<div class="ql">Q3 ─ 後任者</div><div class="qt">退任後の後任者について</div>`+
        radio([{v:'する',l:'① 後任者を選任する',s:'→ Q2Aの就任人数に含めてください'},{v:'しない',l:'② 選任しない（未定を含む）',s:'※ 人数要件の確認が必要になります'}],S.q3_succ,'q3_succ');

    case"q4":
      return `<div class="ql">Q4 ─ 代表取締役</div><div class="qt">代表取締役の変更方法</div>`+
        radio([{v:'新任',l:'① 新たに代表取締役を選定'},{v:'退任＋新任',l:'② 現代表が退任し、新代表を選定'},{v:'変更なし',l:'③ 代表取締役に変更なし'}],S.q4_rep,'q4_rep')+
        (hB()?'<div style="font-size:11px;color:var(--sub);margin-top:8px">※ 取締役会設置 → 取締役会議事録が必要</div>':'');

    case"q5":return renderQ5();

    case"q6":
      return `<div class="ql">Q6 ─ その他</div><div class="qt">その他の変更はありますか？</div>`+
        ["商号変更","本店移転"].map(v=>{const sel=S.q6_ext.includes(v);return `<div class="op${sel?' s':''}" onclick="toggleList('q6_ext','${v}')"><div class="ck">${sel?'✓':''}</div><div class="ol">${v}あり</div></div>`;}).join('')+
        `<div style="margin-top:12px"><div class="st">資本金</div><div class="op${S.capOver?' s':''}" onclick="u('capOver',${!S.capOver})"><div class="ck">${S.capOver?'✓':''}</div><div class="ol">資本金が1億円を超える</div></div></div><div style="font-size:11px;color:var(--sub)">※ 商号変更・本店移転は別途お見積り</div>`;

    case"result":return renderResult();
  }
}

function renderQ5(){
  const ds=dirStatus(),as=audStatus(),sh=S.q5_short;
  const mD=hB()?3:1,mA=hA()?1:0;
  const anyChange=ds!=="変更しない"||as!=="変更しない";
  let h=`<div class="ql">Q5 ─ 人数要件チェック</div><div class="qt">変更後の人数要件</div>`;
  if(anyChange){
    h+=`<div class="cb"><div style="font-weight:600;margin-bottom:4px">▼ 計算結果</div>`;
    // 取締役
    if(ds==="改選"){
      h+=`<div>取締役${tagHTML(ds)}：改選後 <strong>${S.q2a_dK||0}名</strong>（最低${mD}名）${S.q5_dS?'<span class="sh"> ← 不足</span>':''}</div>`;
    }else if(ds==="変更する"){
      h+=`<div>取締役${tagHTML(ds)}：現在${S.q0_cD}名 − 退任${S.q2b_dR||0}名 + 就任${S.q2a_dH||0}名 ＝ <strong>${S.q5_rD}名</strong>（最低${mD}名）${S.q5_dS?'<span class="sh"> ← 不足</span>':''}</div>`;
    }else{
      h+=`<div>取締役${tagHTML(ds)}：<strong>${S.q0_cD}名</strong>（変更なし）</div>`;
    }
    // 監査役
    if(hA()){
      if(as==="改選"){
        h+=`<div>監査役${tagHTML(as)}：改選後 <strong>${S.q2a_aK||0}名</strong>（最低${mA}名）${S.q5_aS?'<span class="sh"> ← 不足</span>':''}</div>`;
      }else if(as==="変更する"){
        h+=`<div>監査役${tagHTML(as)}：現在${S.q0_cA}名 − 退任${S.q2b_aR||0}名 + 就任${S.q2a_aH||0}名 ＝ <strong>${S.q5_rA}名</strong>（最低${mA}名）${S.q5_aS?'<span class="sh"> ← 不足</span>':''}</div>`;
      }else if(as==="変更しない"){
        h+=`<div>監査役${tagHTML(as)}：<strong>${S.q0_cA}名</strong>（変更なし）</div>`;
      }
    }
    h+=`</div>`;
  }
  if(sh===false)h+=`<div class="ob">✓ 人数要件を満たしています。</div>`;
  if(sh===true){
    h+=`<div class="wb">⚠ 変更後の人数が法定要件を下回ります。`;
    if(S.q5_dS)h+=`<div style="margin-top:4px">・取締役：残${S.q5_rD}名（${hB()?'取締役会設置 → 3名以上必須':'最低1名必須'}）</div>`;
    if(S.q5_aS)h+=`<div>・監査役：残${S.q5_rA}名（監査役設置 → 1名以上必須）</div>`;
    if(S.q5_aS&&hB())h+=`<div class="cw">→ 取締役会設置会社は監査役が必須のため、監査役廃止 → 取締役会も廃止が必要</div>`;
    h+=`</div><div style="font-size:13px;font-weight:600;margin-bottom:8px">対応方法を選択してください</div>`;
    const ch=[];
    if((S.q5_dS&&hB())||(S.q5_aS&&hB()))ch.push("取締役会廃止");
    if(S.q5_aS)ch.push("監査役廃止");
    h+=radio([{v:'後任選任',l:'① 後任者を選任する'},{v:'機関設計見直し',l:'② 機関設計を見直す',s:ch.join('＋')||'機関設計の見直し'}],S.q5_res,'q5_res');
  }
  if(!anyChange)h+=`<div class="ob">✓ 役員の変更がないため、人数要件のチェックは不要です。</div>`;
  return h;
}

function calcEstimate(){
  const items=[],ds=dirStatus(),as=audStatus();
  items.push({c:"基本報酬",n:"役員変更手続一式",f:P.base,t:0});
  items.push({c:"議事録作成",n:"株主総会議事録",f:P.minSH,t:0});
  if(hB())items.push({c:"議事録作成",n:"取締役会議事録",f:P.minBD,t:0});
  else items.push({c:"議事録作成",n:"取締役決定書",f:P.minDD,t:0});
  // 取締役の加算
  if(ds==="改選"&&S.q2a_dK>0)items.push({c:"加算",n:`取締役 重任（${S.q2a_dK}名）`,f:P.apPP*S.q2a_dK,t:0});
  if(ds==="変更する"&&S.q2a_dH>0)items.push({c:"加算",n:`取締役 就任（${S.q2a_dH}名）`,f:P.apPP*S.q2a_dH,t:0});
  // 監査役の加算
  if(as==="改選"&&S.q2a_aK>0)items.push({c:"加算",n:`監査役 重任（${S.q2a_aK}名）`,f:P.auPP*S.q2a_aK,t:0});
  if(as==="変更する"&&S.q2a_aH>0)items.push({c:"加算",n:`監査役 就任（${S.q2a_aH}名）`,f:P.auPP*S.q2a_aH,t:0});
  // 退任加算
  if(S.q2b_dR>0)items.push({c:"加算",n:`取締役 退任（${S.q2b_dR}名）`,f:P.rsPP*S.q2b_dR,t:0});
  if(S.q2b_aR>0&&hA())items.push({c:"加算",n:`監査役 退任（${S.q2b_aR}名）`,f:P.rsPP*S.q2b_aR,t:0});
  if(S.q2b_reason==="死亡")items.push({c:"加算",n:"添付書類対応（死亡届等）",f:P.death,t:0});
  // 代表変更
  if(S.q4_rep==="新任"||S.q4_rep==="退任＋新任"||S.q2a_hasRep)items.push({c:"加算",n:"代表取締役変更",f:P.rep,t:0});
  // 機関設計変更
  if(S.q5_res==="機関設計見直し"){
    const nBA=hB()&&(S.q5_dS||S.q5_aS),nAA=S.q5_aS;
    if(nBA)items.push({c:"機関設計変更",n:"取締役会廃止",f:P.org,t:0});
    if(nAA)items.push({c:"機関設計変更",n:"監査役廃止",f:P.org,t:0});
    if(!nBA&&!nAA)items.push({c:"機関設計変更",n:"機関設計変更",f:P.org,t:0});
  }
  items.push({c:"登記申請",n:"登記申請代理",f:P.regFee,t:0});
  const tx=S.capOver?P.tax2:P.tax1;
  items.push({c:"実費",n:`登録免許税（資本金${S.capOver?"1億超":"1億以下"}）`,f:0,t:tx});
  items.push({c:"実費",n:"謄本・閲覧等",f:0,t:P.cert+P.insp});
  if(S.q6_ext.includes("商号変更"))items.push({c:"別途",n:"商号変更 ※別途ご案内",f:0,t:0,note:1});
  if(S.q6_ext.includes("本店移転"))items.push({c:"別途",n:"本店移転 ※別途ご案内",f:0,t:0,note:1});
  const tF=items.reduce((s,i)=>s+i.f,0),tT=items.reduce((s,i)=>s+i.t,0);
  return{items,tF,tT,total:tF+tT};
}

function renderResult(){
  const est=calcEstimate(),ds=dirStatus(),as=audStatus();
  const grouped={};est.items.forEach(i=>{if(!grouped[i.c])grouped[i.c]=[];grouped[i.c].push(i);});
  let h=`<div style="font-size:16px;font-weight:700;margin-bottom:16px">📋 費用概算書</div>`;
  h+=`<div class="sb"><div><strong>機関設計：</strong>${OL[S.q0_organ]}</div>`;
  h+=`<div><strong>現在人数：</strong>取締役${S.q0_cD}名${hA()?`・監査役${S.q0_cA}名`:''}</div>`;
  h+=`<div><strong>取締役：</strong>${ds}${ds==="改選"?` → ${S.q2a_dK}名`:ds==="変更する"?` → ${S.q5_rD}名`:` → ${S.q0_cD}名（変更なし）`}</div>`;
  if(hA())h+=`<div><strong>監査役：</strong>${as}${as==="改選"?` → ${S.q2a_aK}名`:as==="変更する"?` → ${S.q5_rA}名`:` → ${S.q0_cA}名（変更なし）`}</div>`;
  if(S.q5_res==="機関設計見直し"){
    const ch=[];if(hB()&&(S.q5_dS||S.q5_aS))ch.push("取締役会廃止");if(S.q5_aS)ch.push("監査役廃止");
    h+=`<div style="color:var(--warn);font-weight:600;margin-top:4px">⚠ ${ch.join('＋')}を含む</div>`;
  }
  h+=`</div>`;
  for(const[c,items]of Object.entries(grouped)){
    h+=`<div><div class="rc">${c}</div>`;
    items.forEach(i=>{h+=`<div class="rr"><div style="flex:1">${i.n}</div><div style="text-align:right;min-width:80px;font-weight:500">${i.note?'─':(i.f+i.t>0?`¥${fmt(i.f+i.t)}`:'─')}</div></div>`;});
    h+=`</div>`;
  }
  h+=`<div class="rs"><span>報酬小計</span><span>¥${fmt(est.tF)}</span></div>`;
  h+=`<div class="rs" style="border-top:none"><span>実費小計</span><span>¥${fmt(est.tT)}</span></div>`;
  h+=`<div class="rt"><span>合計（税抜概算）</span><span style="color:var(--accent);font-size:20px">¥${fmt(est.total)}</span></div>`;
  h+=`<div class="nt">※ 本概算は簡易見積りです。正式なお見積りは別途ご案内いたします。<br>※ 消費税は含まれておりません。</div>`;
  h+=`<div style="text-align:center;margin-top:16px"><button class="bt" onclick="reset()">最初からやり直す</button></div>`;
  return h;
}

function render(){
  const steps=getSteps(),cs=steps[S.step],isR=cs==="result";
  const anyChange=dirStatus()!=="変更しない"||audStatus()!=="変更しない";
  const eff=cs==="q5"&&!anyChange?true:canGo();
  let h=`<div class="hd"><h1>役員変更 楽楽見積ウィザード</h1><p>司法書士法人名南経営</p></div>`;
  h+=`<div class="prog">${steps.map((_,i)=>`<div class="${i===S.step?'a':i<S.step?'d':''}"></div>`).join('')}</div>`;
  h+=`<div class="cd">${renderStep()}</div>`;
  if(!isR)h+=`<div class="nv"><button class="bt" onclick="goBack()"${S.step===0?' disabled':''}>← 戻る</button><button class="bt p" onclick="goNext()"${!eff?' disabled':''}>${steps[S.step+1]==='result'?'見積を確認 →':'次へ →'}</button></div>`;
  document.getElementById('app').innerHTML=h;
}
render();
</script>
</body>
</html>
